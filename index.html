<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3a9bd8" />
  <title>Che, aprendé</title>
  <meta http-equiv="Cache-Control" content="no-cache" />
  <!-- CACHE_VERSION: subí este número cada vez que se publique un cambio,
       asi el celular baja los archivos nuevos en vez de usar la copia guardada. -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=16" />
</head>
<body>
  <div id="onboarding-screen" class="onboarding-screen"></div>
  <div id="provincia-screen" class="provincia-screen"></div>

  <header class="app-header">
    <div class="app-brand">
      <img src="assets/sol.png" alt="" class="app-sol" />
      <h1 id="app-title">Che, aprendé</h1>
    </div>
    <div class="header-actions">
      <span id="header-streak" class="header-streak"></span>
      <button id="lang-toggle" class="lang-badge" type="button" aria-label="Cambiar idioma">AR</button>
    </div>
  </header>

  <main class="app-main">
    <section id="view-home" class="view active"><div class="view-body"></div></section>
    <section id="view-gramatica" class="view"><div class="view-body"></div></section>
    <section id="view-vocabulario" class="view"><div class="view-body"></div></section>
    <section id="view-produccion" class="view"><div class="view-body"></div></section>
    <section id="view-lectura" class="view"><div class="view-body"></div></section>
    <section id="view-ajustes" class="view"><div class="view-body"></div></section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="home"><span class="ico">🏠</span><span class="lbl" data-i18n="nav_home">Inicio</span></button>
    <button class="nav-btn" data-view="gramatica"><span class="ico">📐</span><span class="lbl" data-i18n="nav_grammar">Gramática</span></button>
    <button class="nav-btn" data-view="vocabulario"><span class="ico">🗂️</span><span class="lbl" data-i18n="nav_vocab">Vocab</span></button>
    <button class="nav-btn" data-view="produccion"><span class="ico">✍️</span><span class="lbl" data-i18n="nav_production">Producción</span></button>
    <button class="nav-btn" data-view="lectura"><span class="ico">📖</span><span class="lbl" data-i18n="nav_lectura">Lectura</span></button>
    <button class="nav-btn" data-view="ajustes"><span class="ico">⚙️</span><span class="lbl" data-i18n="nav_settings">Ajustes</span></button>
  </nav>

  <!-- datos -->
  <script src="data/vocab.data.js?v=16"></script>
  <script src="data/grammar.data.js?v=16"></script>
  <script src="data/produccion.data.js?v=16"></script>
  <script src="data/provincias.data.js?v=16"></script>
  <!-- lógica -->
  <script src="js/storage.js?v=16"></script>
  <script src="js/i18n.js?v=16"></script>
  <script src="js/streak.js?v=16"></script>
  <script src="js/util.js?v=16"></script>
  <script src="js/vocab.js?v=16"></script>
  <script src="js/grammar.js?v=16"></script>
  <script src="js/produccion.js?v=16"></script>
  <script src="js/lectura.js?v=16"></script>
  <script src="js/app.js?v=16"></script>
</body>
</html>
