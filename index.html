<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3a9bd8" />
  <title>Che, aprendé</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <span class="theme-spacer" aria-hidden="true"></span>
    <h1 id="app-title">🧉 Che, aprendé</h1>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Cambiar tema">🌙</button>
  </header>

  <main class="app-main">
    <section id="view-home" class="view active"><div class="view-body"></div></section>
    <section id="view-gramatica" class="view"><div class="view-body"></div></section>
    <section id="view-vocabulario" class="view"><div class="view-body"></div></section>
    <section id="view-produccion" class="view"><div class="view-body"></div></section>
    <section id="view-ajustes" class="view"><div class="view-body"></div></section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="home"><span class="ico">🏠</span><span class="lbl">Inicio</span></button>
    <button class="nav-btn" data-view="gramatica"><span class="ico">📐</span><span class="lbl">Gramática</span></button>
    <button class="nav-btn" data-view="vocabulario"><span class="ico">🗂️</span><span class="lbl">Vocab</span></button>
    <button class="nav-btn" data-view="produccion"><span class="ico">✍️</span><span class="lbl">Producción</span></button>
    <button class="nav-btn" data-view="ajustes"><span class="ico">⚙️</span><span class="lbl">Ajustes</span></button>
  </nav>

  <!-- datos -->
  <script src="data/vocab.data.js"></script>
  <script src="data/grammar.data.js"></script>
  <script src="data/produccion.data.js"></script>
  <!-- lógica -->
  <script src="js/storage.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/util.js"></script>
  <script src="js/vocab.js"></script>
  <script src="js/grammar.js"></script>
  <script src="js/produccion.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
